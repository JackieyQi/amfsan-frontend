services:
  amf-frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://amfsan-web:8080}
        NEXT_PUBLIC_USE_PROXY: ${NEXT_PUBLIC_USE_PROXY:-true}
    image: amfsan-frontend:latest
    container_name: amfsan-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://amfsan-web:8080}
      NEXT_PUBLIC_USE_PROXY: ${NEXT_PUBLIC_USE_PROXY:-true}
    ports:
      - "${AMFSAN_FRONTEND_HTTP_BIND:-0.0.0.0}:${AMFSAN_FRONTEND_HTTP_PORT:-3000}:3000"
    networks:
      - shared-services
    logging:
      driver: json-file
      options:
        max-size: ${AMFSAN_FRONTEND_LOG_MAX_SIZE:-10m}
        max-file: ${AMFSAN_FRONTEND_LOG_MAX_FILE:-3}

networks:
  shared-services:
    external: true
    name: shared-services
